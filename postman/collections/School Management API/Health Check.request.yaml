$kind: http-request
method: GET
url: '{{baseUrl}}/'
order: 1000
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test('Status code is 200', function () {
        pm.response.to.have.status(200);
      });

      const json = pm.response.json();

      pm.test('API health response is successful', function () {
        pm.expect(json.success).to.eql(true);
        pm.expect(json.endpoints).to.have.property('addSchool');
        pm.expect(json.endpoints).to.have.property('listSchools');
      });
